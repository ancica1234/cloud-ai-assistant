# ── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ── Ollama (local dev default) ────────────────────────────────────────────────
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=mistral
spring.ai.ollama.embedding.model=nomic-embed-text

# ── OpenAI (disabled by default, enabled via AWS profile) ────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.embedding.model=text-embedding-3-small
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# ── RAG ──────────────────────────────────────────────────────────────────────
app.ai.vectorstore.path=./vectorstore.json
app.ai.docs.path=./docs
app.ai.rag.top-k=6
app.ai.rag.keyword-top-k=10

# ── AI Persona ───────────────────────────────────────────────────────────────
app.ai.system-prompt=You are a helpful aviation training assistant. Answer questions accurately using only the documentation provided. If the answer is not in the documentation, say so clearly.

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# ── Actuator (for AWS health checks) ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
