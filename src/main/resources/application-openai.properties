# ── OpenAI profile (use on AWS) ───────────────────────────────────────────────
# Activate with: --spring.profiles.active=openai
# Or set env var: SPRING_PROFILES_ACTIVE=openai

spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.embedding.model=text-embedding-3-small
